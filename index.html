<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentru tine 🤍</title>

<style>

body{
  margin:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Segoe UI',sans-serif;

  background:
    radial-gradient(circle at top left,
      rgba(255,120,200,0.35),
      transparent 35%
    ),

    radial-gradient(circle at bottom right,
      rgba(0,180,255,0.30),
      transparent 40%
    ),

    linear-gradient(
      135deg,
      #12051f,
      #2d103f,
      #4f1c5c,
      #7a2d6d
    );

  color:white;
}

/* STELE */

.star{
  position:fixed;

  width:4px;
  height:4px;

  background:white;

  border-radius:50%;

  opacity:0.8;

  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{

  from{
    opacity:0.3;
    transform:scale(1);
  }

  to{
    opacity:1;
    transform:scale(1.8);
  }
}

/* CARD */

.container{

  width:90%;
  max-width:560px;

  padding:45px 35px;

  border-radius:35px;

  background:rgba(255,255,255,0.10);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 30px rgba(255,120,200,0.25),
    0 0 60px rgba(0,180,255,0.15);

  text-align:center;
}

/* TITLU */

h1{

  font-size:44px;

  margin-bottom:30px;

  color:white;

  text-shadow:
    0 0 10px #ff9de6,
    0 0 25px #ff4dc4;
}

/* TEXT */

#question{

  min-height:130px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:28px;

  line-height:1.6;

  color:#fff5fc;

  transition:0.5s;

  text-shadow:
    0 0 8px rgba(255,255,255,0.4);
}

/* BUTON */

button{

  margin-top:20px;

  border:none;

  padding:18px 35px;

  border-radius:20px;

  font-size:18px;

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      90deg,
      #ff4dc4,
      #7a5cff
    );

  box-shadow:
    0 0 15px rgba(255,77,196,0.5);

  transition:0.3s;
}

button:hover{

  transform:scale(1.08);

  box-shadow:
    0 0 25px rgba(255,77,196,0.9);
}

/* POZA FINALĂ */

.final-photo{

  width:240px;
  height:240px;

  object-fit:cover;

  border-radius:30px;

  margin-top:25px;

  border:3px solid rgba(255,255,255,0.3);

  box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 50px rgba(255,77,196,0.4);

  animation:fade 2s;
}

/* TEXT FINAL */

.final-text{

  margin-top:30px;

  font-size:30px;

  line-height:1.7;

  color:white;

  animation:fade 2s;

  text-shadow:
    0 0 12px rgba(255,255,255,0.4);
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* INIMI */

.heart{

  position:fixed;

  bottom:-20px;

  color:#ff9de6;

  animation:float 6s linear forwards;

  pointer-events:none;
}

@keyframes float{

  from{
    transform:translateY(0);
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>Dor nespus✨</h1>

  <div id="question">

    Am ceva să-ți spun... 🤍

  </div>

  <button onclick="nextQuestion()">
    Continuă
  </button>

</div>

<script>

/* STELE */

for(let i=0;i<80;i++){

  const star=document.createElement("div");

  star.classList.add("star");

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";

  star.style.animationDuration=
    (1+Math.random()*3)+"s";

  document.body.appendChild(star);
}

/* ÎNTREBĂRI */

const questions=[

"Ți-e dor de toate momentele noastre? 🥺",

"Ți-e dor de conversațiile care durau până dimineața? ✨",

"Crezi că unele persoane rămân pentru totdeauna parte din sufletul nostru? 🤍",

"Te-ai gândit vreodată cât de repede se schimbă viața? 🌸",

"Și dacă ți-aș spune că s-a întâmplat ceva foarte important...? 💭"

];

let index=0;

function nextQuestion(){

  const q=document.getElementById("question");

  if(index < questions.length){

    q.innerHTML=questions[index];

    index++;

  }else{

    showFinal();
  }
}

/* FINAL */

function showFinal(){

  document.querySelector(".container").innerHTML=`

    <h1>💍</h1>

    <img src="poza-ta.jpg" class="final-photo">

    <div class="final-text">

      Prietena ta cea mai bună<br>
      a fost cerută în căsătorie... 🤍

      <br><br>

      Și și-a dorit ca tu<br>
      să afli într-un mod special. 🥺

    </div>

  `;

  setInterval(createHeart,400);
}

/* INIMI */

function createHeart(){

  const heart=document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML="🤍";

  heart.style.left=Math.random()*100+"vw";

  heart.style.fontSize=
    (18+Math.random()*18)+"px";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);
}

</script>

</body>
</html>
