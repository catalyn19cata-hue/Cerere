<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentru tine 🤍</title>

<style>

body{
  margin:0;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Segoe UI',sans-serif;

  background:
    radial-gradient(circle at top left,
      rgba(255,120,200,0.35),
      transparent 35%
    ),

    radial-gradient(circle at bottom right,
      rgba(0,180,255,0.30),
      transparent 40%
    ),

    linear-gradient(
      135deg,
      #12051f,
      #2d103f,
      #4f1c5c,
      #7a2d6d
    );

  color:white;
}

/* STELE */

.star{
  position:fixed;

  width:4px;
  height:4px;

  background:white;

  border-radius:50%;

  opacity:0.6;

  animation:twinkle 3s infinite alternate;

  z-index:0;
}

@keyframes twinkle{

  from{
    opacity:0.3;
    transform:scale(1);
  }

  to{
    opacity:1;
    transform:scale(1.7);
  }
}

/* CARD */

.container{

  width:90%;
  max-width:500px;

  padding:35px 28px;
margin:40px 0;
  border-radius:35px;

  background:rgba(255,255,255,0.10);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 30px rgba(255,120,200,0.25),
    0 0 60px rgba(0,180,255,0.15);

  text-align:center;

  position:relative;
  z-index:2;
}

/* TITLU */

h1{

  font-size:44px;

  margin-bottom:30px;

  color:white;

  text-shadow:
    0 0 10px #ff9de6,
    0 0 25px #ff4dc4;
}

/* TEXT */

#question{

  min-height:130px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:28px;

  line-height:1.6;

  color:#fff5fc;

  transition:0.5s;

  text-shadow:
    0 0 8px rgba(255,255,255,0.4);
}

/* BUTON */

button{

  margin-top:20px;

  border:none;

  padding:18px 35px;

  border-radius:20px;

  font-size:18px;

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      90deg,
      #ff4dc4,
      #7a5cff
    );

  box-shadow:
    0 0 15px rgba(255,77,196,0.5);

  transition:0.3s;
}

button:hover{

  transform:scale(1.08);

  box-shadow:
    0 0 25px rgba(255,77,196,0.9);
}

/* POZA FINALĂ */
  .answers{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:25px;
}

.answer-btn{
  border:none;
  padding:15px;
  border-radius:18px;
  font-size:17px;
  cursor:pointer;
  color:white;
  background:rgba(255,255,255,0.12);
  transition:0.3s;
}

.answer-btn:hover{
  transform:scale(1.03);
}

.correct{
  background:#38d66b !important;
}

.wrong{
  background:#ff4d6d !important;
}

.final-photo{

  width:220px;
height:220px;

  object-fit:cover;

  border-radius:30px;

  margin-top:25px;

  border:3px solid rgba(255,255,255,0.3);

  box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 50px rgba(255,77,196,0.4);

  animation:fade 2s;

  position:relative;
  z-index:5;
}
.question-photo{

  width:100%;
  height:220px;

  object-fit:cover;

  border-radius:25px;

  margin-bottom:22px;

  border:2px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 20px rgba(255,255,255,0.15);
}
/* TEXT FINAL */

.final-text{

  margin-top:30px;

  font-size:30px;

  line-height:1.7;

  color:white;

  animation:fade 2s;

  text-shadow:
    0 0 12px rgba(255,255,255,0.4);

  position:relative;
  z-index:5;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* INIMI */

.heart{

  position:fixed;

  color:#ffd6ec;

  pointer-events:none;

  animation:float 9s linear forwards;

  z-index:10;
}

@keyframes float{

  from{
    transform:translateY(0);
    opacity:0;
  }

  15%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>Dor nespus ✨</h1>

  <div id="question">

    Am ceva să-ți spun... 🤍

  </div>

  <button onclick="nextQuestion()">
    Continuă
  </button>

</div>

<script>

/* STELE */

for(let i=0;i<80;i++){

  const star=document.createElement("div");

  star.classList.add("star");

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";

  star.style.animationDuration=
    (2+Math.random()*4)+"s";

  document.body.appendChild(star);
}

/* ÎNTREBĂRI */

const questions=[

{
type:"text",
  image:"p4.jpeg",
text:"Ți-e dor de toate momentele noastre? 🥺"
},

{
type:"quiz",
question:"Care era momentul nostru preferat? ✨",
answers:[
"Plimbările târzii",
"Conversațiile până dimineața",
"Filmele random"
],
correct:1
},

{
type:"text",
  image:"p3.jpeg",
text:"Ți-e dor de toate momentele noastre? 🥺"
},

{
type:"quiz",
question:"Care era momentul nostru preferat? ✨",
answers:[
"Plimbările târzii",
"Conversațiile până dimineața",
"Filmele random"
],
correct:1
},

  
{
type:"text",
  image:"p2.jpeg",
text:"Crezi că unele persoane rămân pentru totdeauna parte din sufletul nostru? 🤍"
},

{
type:"quiz",
question:"Ce ne făcea speciali? 🌸",
answers:[
"Felul în care vorbeam ore întregi",
"Cadourile",
"Pozele"
],
correct:0
},

{
type:"text",
  image:"p1.jpeg",
text:"Te-ai gândit vreodată cât de repede se schimbă viața? 💭"
},

{
type:"quiz",
question:"Ce crezi că urmează...?",
answers:[
"O simplă poveste",
"Un final trist",
"O veste importantă"
],
correct:2
}

];

let index=0;

function nextQuestion(){

  const q=document.getElementById("question");

  if(index >= questions.length){
    showFinal();
    return;
  }

  const current=questions[index];

  if(current.type==="text"){

   q.innerHTML=`
  <div>
    <img src="${current.image}" class="question-photo">
    <div>${current.text}</div>
  </div>
`;

    index++;

  }

  else if(current.type==="quiz"){

    q.innerHTML=`
      <div>
       <img src="${current.image}" class="question-photo">

<div>${current.question}</div>

        <div class="answers">
          ${current.answers.map((ans,i)=>
            `<button class="answer-btn"
              onclick="checkAnswer(this,${i},${current.correct})">
              ${ans}
            </button>`
          ).join("")}
        </div>
      </div>
    `;

    index++;
  }
}
function checkAnswer(button,index,correct){

  const buttons =
    document.querySelectorAll(".answer-btn");

  buttons.forEach(btn=>{
    btn.disabled=true;
  });

  if(index===correct){

    button.classList.add("correct");

  }else{

    button.classList.add("wrong");

    buttons[correct].classList.add("correct");
  }
}

  /* apare butonul de continuare */

/* FINAL */

function showFinal(){

  document.querySelector(".container").innerHTML=`

    <h1>💍</h1>

    <img src="poza.jpeg" class="final-photo">

    <div class="final-text">

      Prietena ta cea mai bună<br>
      a fost cerută în căsătorie... 🤍

    </div>

  `;

  setInterval(createHeart,1800);
}

/* INIMI */

function createHeart(){

  const heart=document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML="🤍";

  /* apar de peste tot */
  heart.style.left=Math.random()*100+"vw";

  /* poziții diferite jos */
  heart.style.bottom=
    (-20 - Math.random()*120) + "px";

  heart.style.fontSize=
    (16+Math.random()*14)+"px";

  document.body.appendChild(heart);

  
}

</script>

</body>
</html>
