<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pentru tine 🤍</title>

<style>

body{
  margin:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Segoe UI',sans-serif;

  background:
    radial-gradient(circle at top left,
      rgba(255,120,200,0.35),
      transparent 35%
    ),
    radial-gradient(circle at bottom right,
      rgba(0,180,255,0.30),
      transparent 40%
    ),
    linear-gradient(
      135deg,
      #12051f,
      #2d103f,
      #4f1c5c,
      #7a2d6d
    );

  color:white;
}

/* STELE */

.star{
  position:fixed;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation:twinkle 3s infinite alternate;
  z-index:0;
}

@keyframes twinkle{

  from{
    opacity:0.3;
    transform:scale(1);
  }

  to{
    opacity:1;
    transform:scale(1.6);
  }
}

/* CARD */

.container{

  width:90%;
  max-width:420px;

  padding:20px;

  border-radius:28px;

  background:rgba(255,255,255,0.10);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 30px rgba(255,120,200,0.25),
    0 0 60px rgba(0,180,255,0.15);

  text-align:center;

  position:relative;
  z-index:2;
}

/* TITLU */

h1{

  font-size:32px;

  margin-bottom:15px;

  color:white;

  text-shadow:
    0 0 10px #ff9de6,
    0 0 25px #ff4dc4;
}

/* ÎNTREBARE */

#question{

  min-height:420px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  line-height:1.4;

  color:#fff5fc;
}

/* POZE */

.question-photo{

  width:100%;
  height:180px;

  object-fit:cover;

  border-radius:20px;

  margin-bottom:18px;

  border:2px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 20px rgba(255,255,255,0.15);
}

.final-photo{

  width:210px;
  height:210px;

  object-fit:cover;

  border-radius:30px;

  margin-top:20px;

  border:3px solid rgba(255,255,255,0.3);

  box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 50px rgba(255,77,196,0.4);
}

/* RĂSPUNSURI */

.answers{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.answer-btn{

  border:none;

  padding:13px;

  border-radius:16px;

  font-size:15px;

  cursor:pointer;

  color:white;

  background:rgba(255,255,255,0.12);

  transition:0.3s;
}

.answer-btn:hover{
  transform:scale(1.03);
}

.correct{
  background:#38d66b !important;
}

.wrong{
  background:#ff4d6d !important;
}

/* FINAL */

.final-text{

  margin-top:20px;

  font-size:25px;

  line-height:1.5;

  color:white;

  animation:fade 2s;

  text-shadow:
    0 0 12px rgba(255,255,255,0.4);
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* INIMI */

.heart{

  position:fixed;

  color:#ffd6ec;

  pointer-events:none;

  animation:float 8s linear forwards;

  z-index:10;
}

@keyframes float{

  from{
    transform:translateY(0);
    opacity:0;
  }

  15%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>Dor nespus ✨</h1>

  <div id="question"></div>

</div>

<script>

/* STELE */

for(let i=0;i<70;i++){

  const star=document.createElement("div");

  star.classList.add("star");

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";

  star.style.animationDuration=
    (2+Math.random()*4)+"s";

  document.body.appendChild(star);
}

/* ÎNTREBĂRI */

const questions=[

{
image:"p1.jpeg",
question:"Ți-e dor de toate momentele noastre? 🥺",
answers:[
"Foarte mult",
"În fiecare zi",
"Poate puțin"
],
correct:1
},

{
image:"p2.jpeg",
question:"Care era momentul nostru preferat? ✨",
answers:[
"Plimbările târzii",
"Conversațiile până dimineața",
"Filmele random"
],
correct:1
},

{
image:"p3.jpeg",
question:"Crezi că unele persoane rămân pentru totdeauna în suflet? 🤍",
answers:[
"Da, mereu",
"Poate",
"Nu cred"
],
correct:0
},

{
image:"p4.jpeg",
question:"Ce crezi că urmează...? 💭",
answers:[
"O simplă poveste",
"Un final trist",
"O veste importantă"
],
correct:2
}

];

let index=0;

/* AFIȘARE ÎNTREBARE */

function showQuestion(){

  const q=document.getElementById("question");

  const current=questions[index];

  q.innerHTML=`

    <div>

      <img src="${current.image}" class="question-photo">

      <div>
        ${current.question}
      </div>

      <div class="answers">

        ${current.answers.map((ans,i)=>

          `<button class="answer-btn"
            onclick="checkAnswer(this,${i},${current.correct})">

            ${ans}

          </button>`

        ).join("")}

      </div>

    </div>

  `;
}

/* VERIFICARE */

function checkAnswer(button,indexAnswer,correct){

  const buttons =
    document.querySelectorAll(".answer-btn");

  buttons.forEach(btn=>{
    btn.disabled=true;
  });

  if(indexAnswer===correct){

    button.classList.add("correct");

  }else{

    button.classList.add("wrong");

    buttons[correct].classList.add("correct");
  }

  setTimeout(()=>{

    index++;

    if(index >= questions.length){

      showFinal();

    }else{

      showQuestion();
    }

  },1500);
}

/* FINAL */

function showFinal(){

  document.querySelector(".container").innerHTML=`

    <h1>💍</h1>

    <img src="poza.jpeg" class="final-photo">

    <div class="final-text">

      Prietena ta cea mai bună<br>
      a fost cerută în căsătorie... 🤍

    </div>

  `;

  setInterval(createHeart,1400);
}

/* INIMI */

function createHeart(){

  const heart=document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML="🤍";

  heart.style.left=Math.random()*100+"vw";

  heart.style.bottom=
    (-20 - Math.random()*100) + "px";

  heart.style.fontSize=
    (16+Math.random()*14)+"px";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },8000);
}

/* START */

showQuestion();

</script>

</body>
</html>
