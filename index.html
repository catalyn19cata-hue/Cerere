<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Secret...</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:
    radial-gradient(circle at top,#3a0f2e,#090510 70%);

  font-family:Arial;
  color:white;
  text-align:center;
}

.container{
  width:90%;
  max-width:500px;
}

h1{
  font-size:40px;
  margin-bottom:40px;

  text-shadow:
    0 0 10px #ff4dc4,
    0 0 20px #ff0099;
}

#message{
  font-size:24px;
  min-height:100px;
  margin-bottom:40px;
  transition:0.5s;
}

button{
  padding:18px 40px;
  border:none;
  border-radius:20px;

  background:rgba(255,255,255,0.15);
  color:white;

  font-size:18px;
  cursor:pointer;

  backdrop-filter:blur(10px);

  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

.final{
  font-size:60px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

  <h1>Am un secret...</h1>

  <div id="message">
    Apasă dacă vrei să afli.
  </div>

  <button onclick="nextStep()" id="btn">
    Află
  </button>

</div>

<script>

const steps = [

"Totul a început cu emoții...",
"A existat un moment special...",
"A fost multă iubire acolo...",
"A existat și un inel...",
"Și cel mai important...",
"EA A SPUS DA 💍"

];

let index = 0;

function nextStep(){

  const message = document.getElementById("message");
  const btn = document.getElementById("btn");

  message.innerHTML = steps[index];

  if(index === steps.length - 1){

    message.innerHTML = `
      <div class="final">💍</div>
      <br>
      Prietena ta a fost cerută în căsătorie.
    `;

    btn.style.display = "none";
  }

  index++;
}

</script>

</body>
</html>
