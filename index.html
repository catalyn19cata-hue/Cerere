<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pentru tine 🤍</title>

<style>

body{
  margin:0;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding-top:20px;

  box-sizing:border-box;

  font-family:'Segoe UI',sans-serif;

  overflow:auto;

  background:
  linear-gradient(
    160deg,
    #12051f 0%,
    #24103a 25%,
    #4a1f5f 55%,
    #6f2d73 78%,
    #8f3b88 100%
  );

  background-attachment:fixed;

  color:white;
}
/* STELE */

.star{
  position:fixed;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation:twinkle 3s infinite alternate;
  z-index:0;
}

@keyframes twinkle{
  from{
    opacity:0.3;
    transform:scale(1);
  }

  to{
    opacity:1;
    transform:scale(1.6);
  }
}

/* CARD */

.container{

  width:92%;
  max-width:410px;

  padding:10px 14px 16px;

  border-radius:28px;

  background:rgba(255,255,255,0.10);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.18);

  box-shadow:
    0 0 30px rgba(255,120,200,0.22),
    0 0 60px rgba(0,180,255,0.12);

  text-align:center;

  position:relative;
  z-index:2;
}

/* TITLU */

h1{

  font-size:30px;

  margin-top:0;
  margin-bottom:10px;

  color:white;

  text-shadow:
    0 0 10px #ff9de6,
    0 0 25px #ff4dc4;
}

/* INTRO */

.intro-text{
  font-size:24px;
  line-height:1.5;
  margin:35px 0;
}

/* ÎNTREBARE */

#question{
  min-height:auto;
}

.question-photo{

.p2.jpeg,
.p4.jpeg{
  object-fit:contain;
  background:rgba(0,0,0,0.25);
}
  
  width:100%;

  height:320px;

  object-fit:cover;

  object-position:center top;

  border-radius:22px;

  margin-bottom:14px;

  border:2px solid rgba(255,255,255,0.2);

  box-shadow:
    0 0 25px rgba(255,255,255,0.15);
}
/* TEXT */

.question-text{

  font-size:20px;

  line-height:1.3;

  color:#fff5fc;

  margin-bottom:12px;
}

/* RĂSPUNSURI */

.answers{
  display:flex;
  flex-direction:column;
  gap:10px;
}


.answer-btn{

  border:none;

  padding:12px;

  border-radius:14px;

  font-size:14px;

  cursor:pointer;

  color:white;

  background:rgba(255,255,255,0.12);

  transition:0.3s;
}
.answer-btn:hover{
  transform:scale(1.03);
}

.correct{
  background:#38d66b !important;
}

.wrong{
  background:#ff4d6d !important;
}

/* BUTON CONTINUA */

.continue-btn{

  margin-top:22px;

  border:none;

  padding:14px 22px;

  border-radius:18px;

  font-size:16px;

  cursor:pointer;

  color:white;

  background:linear-gradient(
    135deg,
    #ff5db1,
    #9d4dff
  );

  transition:0.3s;
}

.continue-btn:hover{
  transform:scale(1.05);
}

/* FINAL */

.final-photo{

  width:100%;

  max-width:520px;

  height:420px;

  object-fit:cover;

  object-fit:cover;

  border-radius:28px;

  margin-top:14px;

  border:3px solid rgba(255,255,255,0.3);

  box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 50px rgba(255,77,196,0.4);
}


.final-text{

  margin-top:18px;

  font-size:22px;

  line-height:1.4;

  animation:fade 2s;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* INIMI */

.heart{

  position:fixed;

  color:#ffd6ec;

  pointer-events:none;

  animation:float 8s linear forwards;

  z-index:10;
}

@keyframes float{

  from{
    transform:translateY(0);
    opacity:0;
  }

  15%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container" id="container">

  <h1>🤍</h1>

  <div class="intro-text">
    Am ceva să-ți spun... ✨
  </div>

  <button class="continue-btn" onclick="startQuiz()">
    Continuă
  </button>

</div>

<script>

/* STELE */

for(let i=0;i<70;i++){

  const star=document.createElement("div");

  star.classList.add("star");

  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";

  star.style.animationDuration=
    (2+Math.random()*4)+"s";

  document.body.appendChild(star);
}

/* ÎNTREBĂRI */

const questions=[

{
image:"p1.jpeg",
question:"Mai tii minte in ce an ne-am cunoscut? 🤭",
answers:[
"2013",
"2014",
"2015"
],
correct:1
},

{
image:"p3.jpeg",
question:"Cum am ajuns sa te consider? 🤍",
answers:[
"Ca un strain",
"Ca o prietena",
"Ca o sora"
],
correct:2
},

{
image:"p4.jpeg",
  fit:"contain",
question:"Ce imi lipseste deseori? 🥺",
answers:[
"Sa va revad",
"Bani",
"Bilete catre Darlington"
],
correct:0
},

{
image:"p2.jpeg",
  fit:"contain",
question:"Cine a chinuit-o cel mai mult pe cealalta? 😂",
answers:[
"Laura",
"Papusa",
"Anca"
],
correct:1
}

];

let index=0;

/* START QUIZ */

function startQuiz(){

  document.getElementById("container").innerHTML=`

    <h1>Dor nespus ✨</h1>

    <div id="question"></div>

  `;

  showQuestion();
}

/* AFIȘARE ÎNTREBARE */

function showQuestion(){

  const q=document.getElementById("question");

  const current=questions[index];

  q.innerHTML=`

   <img 
  src="${current.image}" 
  class="question-photo ${current.image}"
>

    <div class="question-text">
      ${current.question}
    </div>

    <div class="answers">

      ${current.answers.map((ans,i)=>

        `<button class="answer-btn"
          onclick="selectAnswer(this,${i},${current.correct})">

          ${ans}

        </button>`

      ).join("")}

    </div>

    <div id="continueArea"></div>

  `;
}

/* SELECTARE RĂSPUNS */

function selectAnswer(button,indexAnswer,correct){

  const buttons =
    document.querySelectorAll(".answer-btn");

  buttons.forEach(btn=>{
    btn.disabled=true;
  });

  if(indexAnswer===correct){

    button.classList.add("correct");

  }else{

    button.classList.add("wrong");

    buttons[correct].classList.add("correct");
  }

  document.getElementById("continueArea").innerHTML=`

    <button class="continue-btn"
      onclick="nextQuestion()">

      Continuă

    </button>

  `;
}

/* NEXT */

function nextQuestion(){

  index++;

  if(index === questions.length){

    showSpecialMessage();

  }else if(index > questions.length){

    showFinal();

  }else{

    showQuestion();
  }
}

  function showSpecialMessage(){

  document.getElementById("container").innerHTML=`

    <h1>🤍</h1>

    <div class="final-text">

      Ai vreun secret față de mine? Eu da! ✨

    </div>

    <button class="continue-btn"
      onclick="showFinal()">

      Continuă

    </button>

  `;
}
/* FINAL */

function showFinal(){

  document.getElementById("container").innerHTML=`

    <h1>💍</h1>

    <img src="poza.jpeg" class="final-photo">

    <div class="final-text">

      Prietena ta cea mai bună<br>
      a fost cerută în căsătorie... 🤍

    </div>

  `;

  setInterval(createHeart,1400);
}

/* INIMI */

function createHeart(){

  const heart=document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML="🤍";

  heart.style.left=Math.random()*100+"vw";

  heart.style.bottom=
    (-20 - Math.random()*100) + "px";

  heart.style.fontSize=
    (16+Math.random()*14)+"px";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },8000);
}

</script>

</body>
</html>
